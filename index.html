<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta de Produtos</title>
    
    <link rel="website icon" type="png" href="./assents/imagens/logo.png">
    <link rel="stylesheet" href="./assents/css/estilos.css">
    <link rel="stylesheet" href="./assents//css/responsivo.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <h2>Sincronizando produtos...</h2>
        <span>Aguarde um momento.</span>
    </div>

    <!-- CONTEÚDO -->
    <main id="app" class="hidden">

        <!-- CABEÇALHO -->
        <header>
            <img src="./assents/imagens/logo.png" alt="Logo" class="logo">
            <h1>Consulta de Produtos</h1>
            <p>Consulte preços e estoque em tempo real.</p>
        </header>

        <!-- PESQUISA -->
        <section class="pesquisa">
            <div class="inputPesquisa">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="pesquisa" placeholder="Digite o nome ou código...">
            </div>
        </section>

        <!-- STATUS -->
        <section id="statusSistema">
            <span id="statusTexto">
                Carregando produtos...
            </span>
            <button id="btnAtualizar">
                Atualizar Produtos
            </button>
        </section>

        <!-- RESULTADOS -->
        <section id="resultado">
            <!-- Inserido via JavaScript -->
        </section>

        <!-- SEM RESULTADOS -->
        <section id="semResultado" class="hidden">
            <div>
                <h2>🔍</h2>
                <h3>Nenhum produto encontrado</h3>
                <span>
                    Tente pesquisar utilizando outro nome.
                </span>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./assents/js/script.js"></script>
</body>

</html>
